spring:
  datasource:
    driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://ngonieclz.database.windows.net:1433;database=free-sql-db-2155917;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
    username: ${SPRING_DATASOURCE_USERNAME:ngonieclz@ngonieclz}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    initialize: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  hateoas:
    use-hal-as-default-json-media-type: false

server:
  port: ${SERVER_PORT:8080}

---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    operationsSorter: method

