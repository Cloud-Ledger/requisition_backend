spring:
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://cloudledgerzim.mysql.database.azure.com:3306/cloudledgerzim_db?autoReconnect=true&useSSL=true}
    username: ${SPRING_DATASOURCE_USERNAME:ngonieclz}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    initialize: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  hateoas:
    use-hal-as-default-json-media-type: false

server:
  port: ${SERVER_PORT:8080}

---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    operationsSorter: method

