# ──────────────────────────────────────────────────────────────
#  CI/CD – Build Docker image → Push to GHCR → Deploy to Azure Container Apps
# ──────────────────────────────────────────────────────────────
name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  # ── GitHub Container Registry (FREE) ──
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/requisition-backend
  # ── Azure Container Apps ──
  RESOURCE_GROUP: requisition-rg
  CONTAINER_APP_NAME: requisition-backend
  CONTAINER_APP_ENV: requisition-env

permissions:
  id-token: write
  contents: read
  packages: write            # needed to push to GHCR

jobs:
  # ━━━━━━━━━━━━━━  BUILD & PUSH  ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set image tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_SHA | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: 🐳 Build & push Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

  # ━━━━━━━━━━━━━━  DEPLOY  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: 🚀 Deploy to Azure Container Apps
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🚀 Deploy Container App
        run: |
          az containerapp create \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APP_ENV }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GHCR_PAT }} \
            --target-port 8080 \
            --ingress external \
            --env-vars \
              SPRING_PROFILES_ACTIVE=prod \
              SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              SERVER_PORT=8080 \
            --min-replicas 0 \
            --max-replicas 1 \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv || \
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
            --set-env-vars \
              SPRING_PROFILES_ACTIVE=prod \
              SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              SERVER_PORT=8080

