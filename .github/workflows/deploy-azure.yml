# ──────────────────────────────────────────────────────────────
#  CI/CD – Build Docker image → Push to ACR → Deploy to Azure Container Apps
# ──────────────────────────────────────────────────────────────
name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  # ── Azure Container Registry ──
  ACR_NAME: requisitionbackendacr
  IMAGE_NAME: requisition-backend
  # ── Azure Container Apps ──
  RESOURCE_GROUP: requisition-rg
  CONTAINER_APP_NAME: requisition-backend
  CONTAINER_APP_ENV: requisition-env

permissions:
  id-token: write
  contents: read

jobs:
  # ━━━━━━━━━━━━━━  BUILD & PUSH  ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔐 Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: 🏷️ Set image tag
        id: tag
        run: echo "TAG=$(echo $GITHUB_SHA | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: 🐳 Build & push Docker image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

  # ━━━━━━━━━━━━━━  DEPLOY  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: 🚀 Deploy to Azure Container Apps
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🚀 Deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          containerAppEnvironment: ${{ env.CONTAINER_APP_ENV }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          targetPort: 8080
          ingress: external
          environmentVariables: >-
            SPRING_PROFILES_ACTIVE=prod
            SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            SERVER_PORT=8080

