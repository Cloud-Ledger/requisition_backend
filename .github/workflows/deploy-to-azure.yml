name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get secrets from Key Vault
        id: keyvault
        run: |
          ACR_USERNAME=$(az keyvault secret show --vault-name requisition-backend-kv --name acr-username --query value -o tsv)
          ACR_PASSWORD=$(az keyvault secret show --vault-name requisition-backend-kv --name acr-password --query value -o tsv)
          DATASOURCE_URL=$(az keyvault secret show --vault-name requisition-backend-kv --name datasource-url --query value -o tsv)
          DATASOURCE_USERNAME=$(az keyvault secret show --vault-name requisition-backend-kv --name datasource-username --query value -o tsv)
          DATASOURCE_PASSWORD=$(az keyvault secret show --vault-name requisition-backend-kv --name datasource-password --query value -o tsv)
          JWT_SECRET_KEY=$(az keyvault secret show --vault-name requisition-backend-kv --name jwt-secret-key --query value -o tsv)

          echo "::add-mask::$ACR_PASSWORD"
          echo "::add-mask::$DATASOURCE_URL"
          echo "::add-mask::$DATASOURCE_USERNAME"
          echo "::add-mask::$DATASOURCE_PASSWORD"
          echo "::add-mask::$JWT_SECRET_KEY"

          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT
          echo "datasource_url=$DATASOURCE_URL" >> $GITHUB_OUTPUT
          echo "datasource_username=$DATASOURCE_USERNAME" >> $GITHUB_OUTPUT
          echo "datasource_password=$DATASOURCE_PASSWORD" >> $GITHUB_OUTPUT
          echo "jwt_secret_key=$JWT_SECRET_KEY" >> $GITHUB_OUTPUT

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: requisitionbackendc.azurecr.io
          username: ${{ steps.keyvault.outputs.acr_username }}
          password: ${{ steps.keyvault.outputs.acr_password }}

      - name: Build and push Docker image
        run: |
          docker build -t requisitionbackendc.azurecr.io/requisition-backend:${{ github.sha }} .
          docker build -t requisitionbackendc.azurecr.io/requisition-backend:latest .
          docker push requisitionbackendc.azurecr.io/requisition-backend:${{ github.sha }}
          docker push requisitionbackendc.azurecr.io/requisition-backend:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: requisition-backend-rg
          containerAppName: requisition-backend-app
          containerAppEnvironment: requisition-env
          imageToDeploy: requisitionbackendc.azurecr.io/requisition-backend:${{ github.sha }}
          registryUrl: requisitionbackendc.azurecr.io
          registryUsername: ${{ steps.keyvault.outputs.acr_username }}
          registryPassword: ${{ steps.keyvault.outputs.acr_password }}
          targetPort: 8080
          ingress: external
          environmentVariables: >-
            SPRING_PROFILES_ACTIVE=prod
            SPRING_DATASOURCE_URL=${{ steps.keyvault.outputs.datasource_url }}
            SPRING_DATASOURCE_USERNAME=${{ steps.keyvault.outputs.datasource_username }}
            SPRING_DATASOURCE_PASSWORD=${{ steps.keyvault.outputs.datasource_password }}
            JWT_SECRET_KEY=${{ steps.keyvault.outputs.jwt_secret_key }}

      - name: Azure logout
        run: az logout
        if: always()
